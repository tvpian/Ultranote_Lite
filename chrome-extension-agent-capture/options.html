<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>UltraNote Capture — Settings</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 480px; margin: 24px auto; padding: 0 16px; }
  label { display: block; font-size: 13px; margin-top: 14px; margin-bottom: 4px; color: #333; font-weight: 600; }
  input, select { width: 100%; box-sizing: border-box; padding: 6px 8px; font: inherit; }
  button { margin-top: 16px; padding: 8px 14px; cursor: pointer; margin-right: 8px; }
  #status { margin-top: 12px; font-size: 13px; white-space: pre-wrap; }
  #status.ok { color: #2e7d32; }
  #status.err { color: #c62828; }
  .hint { font-size: 12px; color: #666; margin-top: 2px; }
  code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; }
</style>
</head>
<body>
  <h2>UltraNote Capture — Settings</h2>

  <label for="host">UltraNote host URL</label>
  <input id="host" type="text" placeholder="https://your-machine.ts.net  (or your Tailscale IP:3366)">
  <div class="hint">Full origin, no trailing slash — must be reachable from this browser (e.g. your Tailscale address).</div>

  <label for="token">Agent API token</label>
  <input id="token" type="password" placeholder="the AGENT_API_TOKEN from your server's .env">
  <div class="hint">Generated on the server via <code>AGENT_API_TOKEN</code> in <code>.env</code>. Never share this.</div>

  <label for="defaultKind">Default kind (used by the right-click "Send selection" menu)</label>
  <select id="defaultKind">
    <option value="note">Note</option>
    <option value="idea">Idea</option>
    <option value="person">Person (People page)</option>
    <option value="paper">Paper summary</option>
  </select>

  <button id="save">Save</button>
  <button id="test">Test connection</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
